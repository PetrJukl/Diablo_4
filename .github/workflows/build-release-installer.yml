name: Build release installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $versionText = '${{ github.ref_name }}'.TrimStart('v', 'V')
          $parsedVersion = $null
          if (-not [Version]::TryParse($versionText, [ref]$parsedVersion)) {
              throw "Tag '${{ github.ref_name }}' nemá podporovaný formát verze. Použij např. v1.0.0.0."
          }

          "value=$($parsedVersion.ToString())" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\installer\build-installer.ps1 -Version '${{ steps.version.outputs.value }}'

      - name: Resolve installer asset
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path 'artifacts/installer' -Filter '*.exe' -File | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if ($null -eq $installer) {
              throw 'Build nevytvořil žádný `.exe` installer v `artifacts/installer`.'
          }

          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.installer.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
